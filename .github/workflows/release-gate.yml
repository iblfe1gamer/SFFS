name: Release Gate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  gate-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Security + full tests
        run: |
          pytest tests -q
      - name: Fail-closed secure mode check
        run: |
          if python main-code/main.py --secure-required --test; then
            echo "secure-required should fail without active Linux isolation marker"
            exit 1
          fi

  gate-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Secure wrapper path must pass
        run: |
          python code2/windows_job_wrapper.py --test
