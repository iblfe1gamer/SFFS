name: SFFS Tests

on:
  push:
  pull_request:

jobs:
  headless-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run headless-safe tests
        run: |
          pytest tests/test_student1.py tests/test_student2.py -q
          python sffs_usb_setup.py --verify

  gui-tests-optional:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies and xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run GUI-oriented tests under xvfb
        run: xvfb-run -a pytest tests/test_student3.py -q
