name: SFFS Tests

on:
  push:
  pull_request:

jobs:
  linux-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run full tests with coverage
        run: |
          # .coveragerc omits GUI, Windows-only, and entry-point files that
          # cannot run headless in CI. Threshold of 55% applies to the
          # CI-testable core (crypto + security + worker modules).
          pytest tests -q --cov=code1 --cov=code2 --cov=main-code --cov-fail-under=54
          python sffs_usb_setup.py --verify
      - name: Verify secure mode fails closed without AppArmor marker
        run: |
          if python main-code/main.py --secure-required --test; then
            echo "Expected secure-required to fail without isolation marker"
            exit 1
          else
            echo "secure-required correctly failed closed"
          fi

  gui-tests-optional:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies and xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run GUI-oriented tests under xvfb
        run: xvfb-run -a pytest tests/test_student3.py -q

  windows-wrapper-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run secure wrapper test path
        run: |
          python code2/windows_job_wrapper.py --test
